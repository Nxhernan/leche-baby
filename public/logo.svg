<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#1a1a2e"/>

  <!-- Baby bottle body -->
  <rect x="180" y="160" width="152" height="220" rx="30" fill="#f0f0f0"/>

  <!-- Bottle neck -->
  <rect x="210" y="110" width="92" height="60" rx="10" fill="#e0e0e0"/>

  <!-- Nipple -->
  <ellipse cx="256" cy="95" rx="35" ry="25" fill="#f4a8b8"/>
  <ellipse cx="256" cy="80" rx="15" ry="12" fill="#e88da0"/>

  <!-- Milk level -->
  <rect x="183" y="240" width="146" height="137" rx="28" fill="#ffeaa7"/>

  <!-- Measurement lines -->
  <line x1="190" y1="200" x2="220" y2="200" stroke="#ccc" stroke-width="2"/>
  <line x1="190" y1="230" x2="210" y2="230" stroke="#ccc" stroke-width="2"/>
  <line x1="190" y1="260" x2="220" y2="260" stroke="#ccc" stroke-width="2"/>
  <line x1="190" y1="290" x2="210" y2="290" stroke="#ccc" stroke-width="2"/>
  <line x1="190" y1="320" x2="220" y2="320" stroke="#ccc" stroke-width="2"/>

  <!-- ml text -->
  <text x="198" y="196" font-family="Arial, sans-serif" font-size="14" fill="#aaa">ml</text>

  <!-- Cute face on bottle -->
  <circle cx="240" cy="305" r="8" fill="#1a1a2e"/>
  <circle cx="272" cy="305" r="8" fill="#1a1a2e"/>
  <path d="M 238 325 Q 256 340 274 325" stroke="#1a1a2e" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="228" cy="318" rx="12" ry="7" fill="#f4a8b8" opacity="0.5"/>
  <ellipse cx="284" cy="318" rx="12" ry="7" fill="#f4a8b8" opacity="0.5"/>

  <!-- Moon and stars (night theme) -->
  <circle cx="390" cy="120" r="30" fill="#ffd369"/>
  <circle cx="405" cy="110" r="25" fill="#1a1a2e"/>

  <circle cx="130" cy="100" r="4" fill="#ffd369"/>
  <circle cx="100" cy="140" r="3" fill="#ffd369"/>
  <circle cx="150" cy="150" r="3" fill="#ffd369"/>
  <circle cx="370" cy="180" r="3" fill="#ffd369"/>
  <circle cx="410" cy="170" r="2" fill="#ffd369"/>

  <!-- Zzz -->
  <text x="340" y="220" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#4ecca3" opacity="0.7">z</text>
  <text x="360" y="195" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#4ecca3" opacity="0.5">z</text>
  <text x="375" y="175" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4ecca3" opacity="0.3">z</text>
</svg>
